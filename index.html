<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vocab Annihilation</title>
  </head>
  <body>
    <main id="app-shell">
      <div id="game-frame">
        <div id="game-root" data-testid="game-root"></div>
        <section id="hud" aria-label="Game status">
          <span>Base <strong data-stat="health">100</strong></span>
          <span>Time <strong data-stat="time">0:00</strong></span>
          <span>Kills <strong data-stat="kills">0</strong></span>
          <span>Vocab <strong data-stat="accuracy">0/0</strong></span>
        </section>
        <section id="bottom-panel" class="bottom-panel" aria-live="polite" data-testid="bottom-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker" data-panel-kicker>Ready</p>
              <h1 data-panel-title>Select a buildable square</h1>
            </div>
            <button class="icon-button" type="button" data-panel-close aria-label="Close panel">×</button>
          </div>
          <div class="panel-body" data-panel-body></div>
        </section>
        <section id="game-over" class="game-over" hidden data-testid="game-over">
          <div>
            <p>Base destroyed</p>
            <strong data-game-over-time>0:00</strong>
          </div>
        </section>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
